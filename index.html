<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер Питания — Неделя Похудения</title>
    <style>
        :root {
            --color-white: rgba(255, 255, 255, 1);
            --color-cream-50: rgba(252, 252, 249, 1);
            --color-cream-100: rgba(255, 255, 253, 1);
            --color-gray-200: rgba(245, 245, 245, 1);
            --color-gray-300: rgba(167, 169, 169, 1);
            --color-slate-500: rgba(98, 108, 113, 1);
            --color-brown-600: rgba(94, 82, 64, 1);
            --color-charcoal-700: rgba(31, 33, 33, 1);
            --color-charcoal-800: rgba(38, 40, 40, 1);
            --color-slate-900: rgba(19, 52, 59, 1);
            --color-teal-300: rgba(50, 184, 198, 1);
            --color-teal-500: rgba(33, 128, 141, 1);
            --color-teal-600: rgba(29, 116, 128, 1);
            --color-teal-700: rgba(26, 104, 115, 1);
            --color-brown-600-rgb: 94, 82, 64;
            --color-teal-500-rgb: 33, 128, 141;
            --color-slate-900-rgb: 19, 52, 59;

            --color-background: var(--color-cream-50);
            --color-surface: var(--color-cream-100);
            --color-text: var(--color-slate-900);
            --color-text-secondary: var(--color-slate-500);
            --color-primary: var(--color-teal-500);
            --color-primary-hover: var(--color-teal-600);
            --color-primary-active: var(--color-teal-700);
            --color-secondary: rgba(var(--color-brown-600-rgb), 0.12);
            --color-border: rgba(var(--color-brown-600-rgb), 0.2);
            --color-card-border: rgba(var(--color-brown-600-rgb), 0.12);

            --font-family-base: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --space-8: 8px;
            --space-12: 12px;
            --space-16: 16px;
            --space-20: 20px;
            --space-24: 24px;
            --radius-base: 8px;
            --radius-lg: 12px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.04);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-gray-400-rgb: 119, 124, 124;
                --color-teal-300-rgb: 50, 184, 198;
                --color-gray-300-rgb: 167, 169, 169;
                --color-gray-200-rgb: 245, 245, 245;

                --color-background: var(--color-charcoal-700);
                --color-surface: var(--color-charcoal-800);
                --color-text: var(--color-gray-200);
                --color-text-secondary: rgba(var(--color-gray-300-rgb), 0.7);
                --color-primary: var(--color-teal-300);
                --color-border: rgba(var(--color-gray-400-rgb), 0.3);
                --color-card-border: rgba(var(--color-gray-400-rgb), 0.2);
                --color-secondary: rgba(var(--color-gray-400-rgb), 0.15);
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: var(--space-20);
            font-family: var(--font-family-base);
            background: var(--color-background);
            color: var(--color-text);
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 var(--space-8) 0;
            color: var(--color-text);
            background: linear-gradient(135deg, var(--color-primary), var(--color-teal-700));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 14px;
            color: var(--color-text-secondary);
            margin-bottom: var(--space-24);
        }

        .stats {
            display: flex;
            gap: var(--space-12);
            margin-bottom: var(--space-24);
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--color-surface);
            border: 1px solid var(--color-card-border);
            border-radius: var(--radius-base);
            padding: var(--space-16);
            flex: 1;
            min-width: 180px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--color-primary);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--color-primary);
        }

        .stat-card h3 {
            font-size: 12px;
            font-weight: 500;
            margin: 0 0 var(--space-8) 0;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--color-primary);
        }

        .day-card {
            background: var(--color-surface);
            border: 1px solid var(--color-card-border);
            border-radius: var(--radius-lg);
            padding: var(--space-20);
            margin-bottom: var(--space-16);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .day-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--color-primary), var(--color-teal-300));
        }

        .day-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-16);
            padding-bottom: var(--space-12);
            border-bottom: 1px solid var(--color-border);
        }

        .day-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--color-text);
        }

        .day-meta {
            display: flex;
            gap: var(--space-12);
            align-items: center;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all 0.2s ease;
        }

        .badge-rest {
            background: rgba(var(--color-brown-600-rgb), 0.2);
            color: var(--color-text);
            border: 1px solid rgba(var(--color-brown-600-rgb), 0.3);
        }

        .badge-workout {
            background: rgba(var(--color-teal-500-rgb), 0.2);
            color: var(--color-primary);
            border: 1px solid var(--color-primary);
        }

        .badge:hover {
            transform: scale(1.05);
        }

        .calories {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-secondary);
        }

        .meals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--space-12);
            margin-bottom: var(--space-16);
        }

        .meal-section {
            background: var(--color-secondary);
            padding: var(--space-12);
            border-radius: var(--radius-base);
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .meal-section:hover {
            border-color: var(--color-border);
            background: rgba(var(--color-brown-600-rgb), 0.18);
        }

        .meal-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--color-text-secondary);
            margin-bottom: var(--space-8);
            letter-spacing: 0.5px;
        }

        .checkbox-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: var(--space-8);
        }

        .checkbox-item:last-child {
            margin-bottom: 0;
        }

        input[type="checkbox"] {
            margin-right: var(--space-8);
            margin-top: 2px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--color-primary);
            flex-shrink: 0;
        }

        .checkbox-label {
            font-size: 13px;
            color: var(--color-text);
            line-height: 1.4;
            cursor: pointer;
        }

        .checkbox-item input[type="checkbox"]:checked + .checkbox-label {
            text-decoration: line-through;
            opacity: 0.5;
            color: var(--color-primary);
        }

        .treat-section {
            background: linear-gradient(135deg, rgba(var(--color-teal-500-rgb), 0.12), rgba(var(--color-brown-600-rgb), 0.12));
            padding: var(--space-12);
            border-radius: var(--radius-base);
            border: 2px dashed var(--color-primary);
            position: relative;
            transition: all 0.2s ease;
        }

        .treat-section:hover {
            background: linear-gradient(135deg, rgba(var(--color-teal-500-rgb), 0.18), rgba(var(--color-brown-600-rgb), 0.15));
            border-color: var(--color-teal-600);
            transform: scale(1.02);
        }

        .treat-section::after {
            content: '✨';
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 16px;
            opacity: 0.6;
        }

        .reset-btn {
            display: inline-block;
            padding: var(--space-8) var(--space-16);
            background: var(--color-primary);
            color: var(--color-white);
            border: none;
            border-radius: var(--radius-base);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: var(--space-16);
        }

        .reset-btn:hover {
            background: var(--color-primary-hover);
        }

        .reset-btn:active {
            background: var(--color-primary-active);
        }

        @media (max-width: 768px) {
            .meals-grid {
                grid-template-columns: 1fr;
            }

            .stats {
                flex-direction: column;
            }

            body {
                padding: var(--space-12);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Трекер Питания на Неделю</h1>
        <p class="subtitle">План питания для похудения на 1–2 кг. Отмечай приёмы пищи галочками!</p>

        <div class="stats">
            <div class="stat-card">
                <h3>Прогресс недели</h3>
                <div class="stat-value"><span id="progress">0</span>%</div>
            </div>
            <div class="stat-card">
                <h3>Отмечено приёмов</h3>
                <div class="stat-value"><span id="checked">0</span> / <span id="total">0</span></div>
            </div>
            <div class="stat-card">
                <h3>Дни подряд</h3>
                <div class="stat-value"><span id="streak">0</span></div>
            </div>
        </div>

        <div id="days-container"></div>

        <button class="reset-btn" onclick="resetAll()">🔄 Сбросить все галочки</button>
    </div>

    <script>
        const mealPlan = [
            {
                day: 'Понедельник',
                status: 'Выходной',
                calories: '~1800',
                meals: {
                    'Завтрак': ['Овсянка 50 г сух', 'Протеин 30 г', 'Яблоко'],
                    'Обед': ['Рис 50 г сух', 'Индейка 220 г', 'Салат', 'Масло 5 г'],
                    'Перекус': ['Творог 200 г', 'Гранат 150 г'],
                    'Ужин': ['Рыба 200 г', 'Овощи', 'Картофель 100 г'],
                    'Вкусное 🍪': ['Печенье 30–40 г']
                }
            },
            {
                day: 'Вторник',
                status: 'Тренировка',
                calories: '~2050',
                meals: {
                    'Завтрак': ['Овсянка 50 г сух', 'Протеин 30 г', 'Банан'],
                    'Обед': ['Макароны 60 г сух', 'Куриная грудка 200 г', 'Овощи/томатный соус'],
                    'Перекус': ['Йогурт греческий 300 г', 'Мандарины 2 шт'],
                    'Ужин': ['Тунец 1 банка', 'Большой салат', 'Фасоль 120 г'],
                    'Вкусное 🍫': ['Шоколад 20–25 г']
                }
            },
            {
                day: 'Среда',
                status: 'Выходной',
                calories: '~1800',
                meals: {
                    'Завтрак': ['Омлет 3 яйца', 'Хлеб 50 г', 'Мандарины 2 шт'],
                    'Обед': ['Перловка 50 г сух', 'Постная говядина 180 г', 'Салат'],
                    'Перекус': ['Протеин 30 г', 'Яблоко'],
                    'Ужин': ['Творог 250 г', 'Ягоды'],
                    'Вкусное 🍦': ['Мороженое 70–80 г']
                }
            },
            {
                day: 'Четверг',
                status: 'Тренировка',
                calories: '~2050',
                meals: {
                    'Завтрак': ['Овсянка 50 г сух', 'Протеин 30 г', 'Банан'],
                    'Обед': ['Картофель 200 г', 'Курица 220 г', 'Салат', 'Масло 5 г'],
                    'Перекус': ['Творог 200 г', 'Гранат 150 г'],
                    'Ужин': ['Рис 50 г сух', 'Рыба 200 г', 'Овощи'],
                    'Вкусное 🌯': ['Шаурма мини (половина)']
                }
            },
            {
                day: 'Пятница',
                status: 'Тренировка',
                calories: '~2050',
                meals: {
                    'Завтрак': ['Яичница 3 яйца', 'Хлеб 50 г', 'Яблоко'],
                    'Обед': ['Гречка/перловка 50 г сух', 'Индейка 220 г', 'Салат'],
                    'Перекус': ['Йогурт греческий 300 г', 'Мандарины 2 шт'],
                    'Ужин': ['Рыба/курица 200 г', 'Овощи', 'Картофель 100 г'],
                    'Вкусное 🍫': ['Шоколад 20–25 г']
                }
            },
            {
                day: 'Суббота',
                status: 'Тренировка',
                calories: '~2050',
                meals: {
                    'Завтрак': ['Сырники (творог 250 г)', 'Сметана 10–15 г', 'Мандарины 2 шт'],
                    'Обед': ['Плов лайт: рис 60 г сух', 'Говядина 180 г', 'Овощи'],
                    'Перекус': ['Протеин 30 г', 'Банан'],
                    'Ужин': ['Большой салат', 'Тунец/курица 200 г'],
                    'Вкусное 🍕': ['Пицца 1 кусок']
                }
            },
            {
                day: 'Воскресенье',
                status: 'Тренировка',
                calories: '~2050',
                meals: {
                    'Завтрак': ['Овсянка 50 г сух', 'Протеин 30 г', 'Яблоко'],
                    'Обед': ['Макароны 60 г сух', 'Курица 200 г', 'Салат'],
                    'Перекус': ['Творог 200 г', 'Гранат 150 г'],
                    'Ужин': ['Рис 50 г сух', 'Индейка 220 г', 'Овощи'],
                    'Вкусное 🍰': ['Десерт до 300 ккал']
                }
            }
        ];

        function generateDays() {
            const container = document.getElementById('days-container');
            container.innerHTML = '';

            mealPlan.forEach((day, dayIndex) => {
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';

                const badgeClass = day.status === 'Выходной' ? 'badge-rest' : 'badge-workout';
                
                let mealsHTML = '';
                let itemCount = 0;

                for (const [mealType, items] of Object.entries(day.meals)) {
                    const isTreat = mealType.includes('Вкусное');
                    const sectionClass = isTreat ? 'treat-section' : 'meal-section';
                    
                    let itemsHTML = '';
                    items.forEach((item, itemIndex) => {
                        const id = `day${dayIndex}-meal${itemCount}`;
                        itemsHTML += `
                            <div class="checkbox-item">
                                <input type="checkbox" id="${id}" onchange="updateStats()">
                                <label class="checkbox-label" for="${id}">${item}</label>
                            </div>
                        `;
                        itemCount++;
                    });

                    mealsHTML += `
                        <div class="${sectionClass}">
                            <div class="meal-title">${mealType}</div>
                            ${itemsHTML}
                        </div>
                    `;
                }

                dayCard.innerHTML = `
                    <div class="day-header">
                        <div class="day-title">${day.day}</div>
                        <div class="day-meta">
                            <span class="badge ${badgeClass}">${day.status}</span>
                            <span class="calories">${day.calories}</span>
                        </div>
                    </div>
                    <div class="meals-grid">
                        ${mealsHTML}
                    </div>
                `;

                container.appendChild(dayCard);
            });

            loadState();
            updateStats();
        }

        function updateStats() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const total = checkboxes.length;
            const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
            const progress = total > 0 ? Math.round((checked / total) * 100) : 0;

            document.getElementById('total').textContent = total;
            document.getElementById('checked').textContent = checked;
            document.getElementById('progress').textContent = progress;

            const streak = calculateStreak();
            document.getElementById('streak').textContent = streak;

            saveState();
        }

        function calculateStreak() {
            let currentStreak = 0;
            const days = document.querySelectorAll('.day-card');
            
            for (let i = 0; i < days.length; i++) {
                const dayCheckboxes = days[i].querySelectorAll('input[type="checkbox"]');
                const allChecked = Array.from(dayCheckboxes).every(cb => cb.checked);
                
                if (allChecked && dayCheckboxes.length > 0) {
                    currentStreak++;
                } else {
                    break;
                }
            }
            
            return currentStreak;
        }

        function saveState() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const state = Array.from(checkboxes).map(cb => cb.checked);
            localStorage.setItem('mealPlanState', JSON.stringify(state));
        }

        function loadState() {
            const savedState = localStorage.getItem('mealPlanState');
            if (savedState) {
                const state = JSON.parse(savedState);
                const checkboxes = document.querySelectorAll('input[type="checkbox"]');
                state.forEach((checked, index) => {
                    if (checkboxes[index]) {
                        checkboxes[index].checked = checked;
                    }
                });
            }
        }

        function resetAll() {
            if (confirm('Сбросить все галочки? Это действие нельзя отменить.')) {
                const checkboxes = document.querySelectorAll('input[type="checkbox"]');
                checkboxes.forEach(cb => cb.checked = false);
                updateStats();
            }
        }

        generateDays();
    </script>
</body>
</html>
